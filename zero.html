<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity: Oil Immersion Mitigation Sim</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --oil-color: rgba(34, 211, 238, 0.6);
            --core-hot: #ef4444;
            --core-safe: #22c55e;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .panel {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #38bdf8; text-align: center; grid-column: 1/-1; }

        /* --- Input Slider --- */
        .control-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; color: #94a3b8; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #38bdf8; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; font-weight: bold; display: block; margin-top: 5px; }

        /* --- Transformer Visualizer --- */
        .visualizer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tank-exterior {
            width: 240px;
            height: 300px;
            border: 4px solid #64748b;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            background: #020617;
        }

        /* The Animated Oil Level */
        .oil-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--oil-color);
            transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 2px solid #22d3ee;
            z-index: 2;
        }

        /* The Heating Core */
        .transformer-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 160px;
            background: #334155;
            border-radius: 4px;
            z-index: 1;
            transition: background 0.5s ease, box-shadow 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #475569;
        }

        .core-glow {
            width: 80%;
            height: 80%;
            border-radius: 4px;
            filter: blur(15px);
            transition: background 0.5s ease;
        }

        .mitigation-badge {
            margin-top: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .active { background: #166534; color: #4ade80; box-shadow: 0 0 15px #166534; }
        .inactive { background: #450a0a; color: #f87171; }

    </style>
</head>
<body>

    <h1>AURASHIELD-AI: AI-DRIVEN RISK INTELLIGENCE SYSTEM FOR GEOMAGNETIC STORM IMPACT PREDICTION</h1>

    <div class="container">
        <div class="panel">
            <div class="control-group">
                <label>CatBoost Storm Probability (P)</label>
                <input type="range" id="probSlider" min="0" max="1" step="0.01" value="0.2">
                <div class="stat-grid">
                    <div class="stat-box">
                        <span class="stat-label">Probability</span>
                        <span id="probVal" class="stat-val">20%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">GIC Intensity</span>
                        <span id="gicVal" class="stat-val">Low</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>System Mode</label>
                <select id="modeSelect" style="width: 100%; padding: 8px; border-radius: 5px; background: #0f172a; color: white; border: 1px solid #334155;">
                    <option value="auto">AI Mitigation (Active Oil Immersion)</option>
                    <option value="manual">Manual (Standard Cooling Only)</option>
                </select>
            </div>

            <div class="stat-grid">
                <div class="stat-box" style="grid-column: 1/-1;">
                    <span class="stat-label">Hotspot Temperature</span>
                    <span id="tempVal" class="stat-val" style="color: #22c55e;">78.5°C</span>
                </div>
            </div>
        </div>

        <div class="panel visualizer">
            <div class="tank-exterior">
                <div id="oil" class="oil-level" style="height: 30%;"></div>
                
                <div class="transformer-core" id="coreBody">
                    <div id="glow" class="core-glow"></div>
                </div>
            </div>
            
            <div id="mitigationStatus" class="mitigation-badge inactive">Standard Cooling</div>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 15px; text-align: center;">
                As Probability rises, AI increases Oil Immersion level to shield the core from GIC-induced thermal saturation.
            </p>
        </div>
    </div>

    <script>
        const slider = document.getElementById('probSlider');
        const mode = document.getElementById('modeSelect');
        const oil = document.getElementById('oil');
        const glow = document.getElementById('glow');
        const tempDisplay = document.getElementById('tempVal');
        const probDisplay = document.getElementById('probVal');
        const gicDisplay = document.getElementById('gicVal');
        const badge = document.getElementById('mitigationStatus');

        function updateSim() {
            const p = parseFloat(slider.value);
            const isAuto = mode.value === 'auto';
            
            // 1. Calculate GIC Heat (Prob increases heat)
            const heatInput = p * 120; // Max potential heat increase
            
            // 2. Innovation Logic: Calculate Oil Immersion Level
            // In Auto mode, we increase oil level as probability rises
            let oilLevel = isAuto ? (30 + (p * 65)) : 30; 
            
            // 3. Calculate Final Temperature
            // Mitigation effectiveness: Higher immersion = lower heat gain
            let coolingFactor = isAuto ? (1 + (p * 4.5)) : 1.0;
            let finalTemp = 75 + (heatInput / coolingFactor);

            // Update UI
            probDisplay.innerText = Math.round(p * 100) + "%";
            oil.style.height = oilLevel + "%";
            tempDisplay.innerText = finalTemp.toFixed(1) + "°C";

            // Temperature Styling
            if (finalTemp > 140) {
                tempDisplay.style.color = "#ef4444";
                glow.style.background = "rgba(239, 68, 68, 0.8)";
            } else if (finalTemp > 100) {
                tempDisplay.style.color = "#f59e0b";
                glow.style.background = "rgba(245, 158, 11, 0.6)";
            } else {
                tempDisplay.style.color = "#22c55e";
                glow.style.background = "rgba(34, 211, 238, 0.2)";
            }

            // GIC Labels
            if (p < 0.4) gicDisplay.innerText = "Low";
            else if (p < 0.7) gicDisplay.innerText = "Moderate";
            else gicDisplay.innerText = "Severe";

            // Badge Update
            if (isAuto && p > 0.39) {
                badge.innerText = "Active Oil Immersion: High";
                badge.className = "mitigation-badge active";
            } else {
                badge.innerText = "Standard Cooling";
                badge.className = "mitigation-badge inactive";
            }
        }

        slider.addEventListener('input', updateSim);
        mode.addEventListener('change', updateSim);
        updateSim();
    </script>
</body>
</html>
